# Oncology TA Pack
# Loaded by concept finders to expand queries and flag known ambiguities

concept_synonyms:
  index_date:
    - "cohort entry"
    - "treatment initiation"
    - "first qualifying dispensing"
    - "line of therapy start"
    - "first administration"
    - "initiation date"
    - "start of treatment"
    - "first prescription"
    - "index event"
    - "first infusion"

  follow_up_end:
    - "end of follow-up"
    - "data cutoff"
    - "last available date"
    - "end of study period"
    - "administrative censoring"
    - "loss to follow-up"
    - "end of continuous enrollment"

  follow_up_start:
    - "index date"
    - "day 1"
    - "treatment start"
    - "first dose"

  primary_endpoint:
    - "primary outcome"
    - "primary objective"
    - "main outcome"
    - "primary analysis"
    - "key endpoint"

  eligibility_inclusion:
    - "inclusion criteria"
    - "eligible patients"
    - "patient selection"
    - "study population"
    - "qualifying criteria"

  eligibility_exclusion:
    - "exclusion criteria"
    - "ineligible"
    - "not eligible"
    - "prior therapy"
    - "washout"

  censoring_rules:
    - "censoring"
    - "censored"
    - "competing event"
    - "loss to follow-up"
    - "administrative censoring"
    - "end of data availability"

ambiguity_hotspots:
  - concept: index_date
    severity: high
    warning: >
      Oncology protocols frequently conflict between diagnosis date and treatment
      initiation. Check Section 3 (design) AND Section 5 (eligibility) AND
      Appendix for drug list. Line-of-therapy definitions may differ across sections.

  - concept: follow_up_end
    severity: high
    warning: >
      Multiple competing censoring rules common in oncology — MACE event,
      death, data cutoff, end of enrollment, disenrollment. Verify all rules
      are captured and whether they apply to all endpoints or only primary.

  - concept: eligibility_inclusion
    severity: medium
    warning: >
      Prior treatment requirements and washout periods in oncology are often
      buried in appendix drug lists or footnotes to eligibility tables.
      Always check appendices before finalizing I/E criteria.

  - concept: primary_endpoint
    severity: medium
    warning: >
      Oncology endpoints often have composite definitions (OS, PFS, TTP).
      Ensure time-zero anchor matches index date definition.
      Check estimand framework section if present.

