ambiguity_hotspots:
  - concept: primary_endpoint
    severity: high
    warning: >
      Vaccine effectiveness endpoints vary — lab-confirmed infection vs
      medically attended illness vs hospitalization vs death. Confirm the
      case definition and required confirmation (PCR, antigen, clinical).
      Check if VE is measured as 1-RR, 1-OR, or 1-HR.

  - concept: index_date
    severity: high
    warning: >
      Multi-dose vaccine schedules complicate index date — confirm whether
      index is dose 1, dose 2, or last dose. Check risk window start
      (e.g., 14 days post-vaccination for immune response onset).

  - concept: eligibility_inclusion
    severity: medium
    warning: >
      Vaccine study populations differ significantly — confirm age cutoffs,
      immunocompromised inclusion/exclusion, prior infection history
      requirements, and whether healthcare workers are included or analyzed
      separately.

  - concept: clinical_characteristics
    severity: medium
    warning: >
      Prior vaccination and infection history definitions vary. Confirm
      lookback window for prior doses and how hybrid immunity
      (prior infection + vaccination) is handled.

