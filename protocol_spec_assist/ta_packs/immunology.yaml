ambiguity_hotspots:
  - concept: primary_endpoint
    severity: high
    warning: >
      Disease activity scores vary by condition — DAS28 for RA, PASI for psoriasis,
      SLEDAI for SLE, EASI for atopic dermatitis. Confirm which score is primary
      and what threshold defines response vs remission.

  - concept: eligibility_inclusion
    severity: medium
    warning: >
      Biologic experience status is critical — confirm whether biologic-naive,
      biologic-experienced, or inadequate responders. Check how many prior
      biologics and which mechanism classes are required or excluded.

  - concept: treatment_variables
    severity: medium
    warning: >
      Treatment line definitions differ across immunology conditions.
      Confirm whether conventional DMARDs count as a prior line. Check if
      biosimilar switches count as treatment switches.

