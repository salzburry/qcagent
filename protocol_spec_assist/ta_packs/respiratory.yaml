ambiguity_hotspots:
  - concept: primary_endpoint
    severity: high
    warning: >
      Exacerbation definitions vary significantly — moderate (OCS burst),
      severe (hospitalization/ED), vs any exacerbation. Confirm exact definition
      and whether composite or individual components.

  - concept: eligibility_inclusion
    severity: medium
    warning: >
      COPD diagnosis confirmation requirements vary — spirometry-confirmed
      vs clinical diagnosis. Check if reversibility testing is required.
      Asthma-COPD overlap may affect eligibility.

